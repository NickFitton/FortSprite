<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">fortsprite Fortnite Sprite Checklist</title>
  <desc id="desc">A colorful preview card for fortsprite, a Fortnite Sprite checklist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071031"/>
      <stop offset="0.48" stop-color="#1734a5"/>
      <stop offset="1" stop-color="#732de0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28d7ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff4fd8" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="title-shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#1230a5" flood-opacity="1"/>
      <feDropShadow dx="0" dy="14" stdDeviation="0" flood-color="#000000" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#28d7ff" flood-opacity="0.5"/>
    </filter>
    <pattern id="stripes" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="42" height="42" fill="none"/>
      <rect width="3" height="42" fill="#ffffff" opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stripes)"/>
  <circle cx="156" cy="95" r="210" fill="#ffe34d" opacity="0.2"/>
  <circle cx="1030" cy="86" r="230" fill="#ff4fd8" opacity="0.2"/>
  <circle cx="915" cy="524" r="250" fill="#28d7ff" opacity="0.12"/>

